<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAGANI | Art & Engineering</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@200;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020202] text-white overflow-x-hidden">

    <div id="toast-container" class="fixed top-10 right-10 z-[600] flex flex-col gap-4"></div>

    <nav class="fixed top-0 inset-x-0 z-[100] p-6 transition-all duration-700" id="mainNav">
        <div class="max-w-screen-2xl mx-auto flex justify-between items-center">
            <div class="flex gap-10 text-[9px] uppercase tracking-[0.4em] font-bold">
                <a href="#" class="hover:text-amber-500 transition">Atelier</a>
                <a href="#heritage" class="hover:text-amber-500 transition">Heritage</a>
            </div>
            <div class="absolute left-1/2 -translate-x-1/2">
                <img src="https://www.carlogos.org/car-logos/pagani-logo-2000-download.png" class="h-10 md:h-14 brightness-125">
            </div>
            <div id="authStatus">
                <button onclick="openAuth()" class="border border-white/20 px-8 py-2 text-[9px] uppercase tracking-[0.3em] font-bold hover:bg-white hover:text-black transition-all">Sign In</button>
            </div>
        </div>
    </nav>

    <section class="relative h-[80vh] w-full overflow-hidden border-b border-white/5">
        <div id="heroSlider" class="h-full w-full flex transition-transform duration-1000"></div>
        <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
            <div class="text-center space-y-4">
                <h1 class="text-xs uppercase tracking-[1.5em] text-amber-600 font-bold">The Hypercar Experience</h1>
                <h2 class="text-7xl md:text-9xl pagani-font italic">MODENA</h2>
            </div>
        </div>
    </section>

    <main class="max-w-screen-2xl mx-auto px-6 py-32">
        <div id="carGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-24"></div>
    </main>

    <div id="carModal" class="fixed inset-0 z-[500] hidden items-center justify-center p-4 md:p-12">
        <div id="modalBlurBg" class="absolute inset-0 bg-black/90 backdrop-blur-3xl transition-all duration-700"></div>
        <div class="relative bg-zinc-950 border border-white/10 w-full max-w-7xl flex flex-col lg:flex-row overflow-hidden shadow-2xl reveal-modal">
            <button onclick="closeCarModal()" class="absolute top-8 right-8 text-4xl text-white/50 hover:text-amber-500 z-[60]">&times;</button>
            <div class="w-full lg:w-3/5 h-[400px] lg:h-[600px]">
                <img id="modalImg" src="" class="w-full h-full object-cover">
            </div>
            <div class="w-full lg:w-2/5 p-10 md:p-16 flex flex-col justify-center bg-zinc-950">
                <p id="modalYear" class="text-amber-600 font-bold tracking-[0.5em] text-[10px] mb-2 uppercase"></p>
                <h3 id="modalTitle" class="text-5xl pagani-font italic mb-10 leading-none"></h3>
                <div id="modalSpecs" class="space-y-4"></div>
                <div class="mt-12 pt-10 border-t border-white/5">
                    <p id="modalPrice" class="text-3xl pagani-font text-amber-500"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-[300] hidden items-center justify-center p-6">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-xl" onclick="closeAuth()"></div>
        <div class="relative bg-[#0a0a0a] border border-white/10 w-full max-w-md p-10 shadow-2xl reveal-modal text-center">
            <h3 class="text-3xl pagani-font italic mb-8" id="authTitle">Sign In</h3>
            <form id="authForm" class="space-y-6 text-left">
                <div id="nameGroup" class="space-y-2 hidden">
                    <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Full Name</label>
                    <input type="text" id="authName" class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-amber-600 transition" placeholder="Your Name">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Email</label>
                    <input type="email" id="authEmail" required class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-amber-600 transition" placeholder="name@example.com">
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] uppercase tracking-widest text-zinc-500 font-bold">Password</label>
                    <input type="password" id="authPass" required class="w-full bg-white/5 border border-white/10 p-4 outline-none focus:border-amber-600 transition" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-amber-600 text-black py-4 uppercase text-[10px] font-bold tracking-[0.3em] hover:bg-white transition-all">Submit</button>
            </form>
            <button onclick="toggleAuth()" class="mt-8 text-xs text-zinc-500 underline hover:text-white" id="authBtn">Register</button>
        </div>
    </div>

    <footer class="bg-zinc-950 border-t border-white/5 py-20 px-6">
        <div class="max-w-screen-2xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
            
            <div class="flex flex-col items-center md:items-start gap-4">
                <img src="https://www.carlogos.org/car-logos/pagani-logo-2000-download.png" class="h-10 opacity-50 grayscale hover:grayscale-0 transition duration-700">
                <p class="text-[10px] uppercase tracking-[0.4em] text-zinc-600">&copy; 2026 Pagani Automobili S.p.A.</p>
            </div>

            <div class="flex flex-col items-center gap-6">
                <h4 class="text-[10px] uppercase tracking-[0.8em] text-amber-600 font-bold">Connect with Art</h4>
                <div class="flex gap-8 text-2xl text-zinc-500">
                    <a href="https://www.instagram.com/paganiautomobili/" target="_blank" class="hover:text-white transition-all transform hover:scale-125">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="https://t.me/paganiautomobili" target="_blank" class="hover:text-white transition-all transform hover:scale-125">
                        <i class="fa-brands fa-telegram"></i>
                    </a>
                    <a href="https://www.facebook.com/PaganiAutomobili" target="_blank" class="hover:text-white transition-all transform hover:scale-125">
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a href="https://www.youtube.com/user/PaganiAutomobili" target="_blank" class="hover:text-white transition-all transform hover:scale-125">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </div>
            </div>

            <div class="text-center md:text-right">
                <p class="text-[9px] uppercase tracking-widest text-zinc-500 mb-4 italic">San Cesario sul Panaro, Modena, Italy</p>
                <button onclick="window.scrollTo(0,0)" class="text-[10px] uppercase tracking-[0.3em] text-white border-b border-white/20 pb-1 hover:border-amber-600 transition">Back to Top</button>
            </div>

        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
